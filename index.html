<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>訪問鍼灸アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    /* フッターが被らないよう余白を多めに確保 (120px) */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 120px); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Pen, Eraser, Undo, Save, User, FileText, CheckCircle, Stethoscope, MapPin, UserCircle, RefreshCcw, Sparkles, Loader2, Info, Users, Navigation, Phone, Calendar, AlertCircle, Plus, ChevronDown, ChevronUp, FilePlus2 } from 'lucide-react';

    // 🚨 【超重要】ここをご自身のGASのURLに書き換えてください！
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyzKXEjzeCnt25coqe2ItRkgFhu-rQUMY5hZnVi2wE-6A8Rpa_oorPPkFNYmOPUIpBBNA/exec';

    const STAFF_NAMES = ['森', '野口', '西山', '岡島'];
    const ACUPUNCTURE_DISEASES = ['神経痛', 'リウマチ', '頸肩腕症候群', '五十肩', '腰痛症', '頸椎捻挫後遺症'];
    // 刷新された項目
    const ACUPUNCTURE_AREAS = ['頭頸部', '体幹部', '背腰部', '胸腹部', '上肢', '下肢'];
    const ACUPUNCTURE_OPTIONS = ['置き鍼', '電気鍼（パルス）', '接触鍼', 'せんねん灸', 'もぐさ', '電気灸'];
    const MASSAGE_AREAS = ['躯幹', '右上肢', '左上肢', '右下肢', '左下肢'];
    const MASSAGE_OPTIONS = ['指圧', 'あん摩', 'ストレッチ', 'モビュライゼーション', 'トレーニング', '可動域訓練', '軽擦', 'homeEX', '揉捏'];

    function App() {
      // 依頼通り: 訪問予定、患者リスト、入力中
      const [activeTab, setActiveTab] = useState('schedule');
      const [currentStaff, setCurrentStaff] = useState('森'); 
      const [scheduleData, setScheduleData] = useState([]);
      const [patientsData, setPatientsData] = useState([]);
      const [lastRecordsData, setLastRecordsData] = useState({});
      const [isLoading, setIsLoading] = useState(false);
      const [expandedPatientId, setExpandedPatientId] = useState(null); // アコーディオン用

      const [formData, setFormData] = useState({
        staffName: '森', visitType: '再検', patientName: '', date: getJstTodayYmd(), chiefComplaint: '',
        treatmentTypes: { acupuncture: false, massage: false }, acupunctureDisease: '', acupunctureAreas: [], acupunctureDetails: [],
        massageAreas: [], massageDetails: [], notes: ''
      });

      const [isSaving, setIsSaving] = useState(false);
      const [saveError, setSaveError] = useState('');
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);
      
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const [marks, setMarks] = useState([]); 
      const [currentMarkType, setCurrentMarkType] = useState('red-circle'); 

      function getJstTodayYmd() {
        const jstDate = new Date(Date.now() + 9 * 60 * 60 * 1000);
        return jstDate.toISOString().slice(0, 10);
      }

      function normalizeYmd(value) {
        if (!value) return '';
        if (value instanceof Date && !Number.isNaN(value.getTime())) {
          return new Date(value.getTime() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
        }
        if (typeof value === 'number') {
          const excelEpoch = new Date(Date.UTC(1899, 11, 30));
          const date = new Date(excelEpoch.getTime() + value * 24 * 60 * 60 * 1000);
          return date.toISOString().slice(0, 10);
        }
        const text = String(value).trim();
        if (/^\d{4}-\d{2}-\d{2}T/.test(text)) {
          const parsedIso = new Date(text);
          return Number.isNaN(parsedIso.getTime()) ? '' : new Date(parsedIso.getTime() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
        }
        const ymd = text.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})/);
        if (ymd) return `${ymd[1]}-${ymd[2].padStart(2, '0')}-${ymd[3].padStart(2, '0')}`;
        const parsed = new Date(text);
        if (!Number.isNaN(parsed.getTime())) {
          return new Date(parsed.getTime() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
        }
        return '';
      }

      const pickValue = (source, keys) => {
        if (!source) return undefined;
        for (const key of keys) {
          if (source[key] !== undefined && source[key] !== null && source[key] !== '') return source[key];
        }
        return undefined;
      };

      const toArray = (value) => {
        if (Array.isArray(value)) return value.filter(Boolean);
        if (!value) return [];
        return String(value).split(/[、,\n]/).map(item => item.trim()).filter(Boolean);
      };

      const isBlank = (value) => value === undefined || value === null || String(value).trim() === '';

      const getPatientName = (item) => pickValue(item, ['name', 'patientName', '患者名']) || '';
      const getStaffName = (item) => pickValue(item, ['staff', 'staffName', '担当者']) || '';
      const getScheduleDate = (item) => pickValue(item, ['date', 'visitDate', '日付', '訪問日']) || '';

      const getPatientMissingFields = (patient) => {
        const fields = [
          { label: '住所', keys: ['address', '住所'] },
          { label: '電話番号', keys: ['phone', 'tel', 'telephone', '電話番号', '電話'] },
          { label: '生年月日', keys: ['birthDate', 'birthday', 'dateOfBirth', '生年月日'] },
          { label: '目標', keys: ['goal', '目標'] },
          { label: '注意事項', keys: ['notes', 'caution', 'cautions', '注意事項'] },
          { label: '内容', keys: ['content', 'treatmentContent', 'contents', '内容'] }
        ];
        return fields.filter(field => isBlank(pickValue(patient, field.keys))).map(field => field.label);
      };

      const getLastRecordForPatient = (patientName) => {
        if (!patientName) return null;
        const patient = patientsData.find(p => getPatientName(p) === patientName);
        return patient?.lastRecord || lastRecordsData[patientName] || null;
      };

      const normalizeTreatmentTypes = (record) => {
        const raw = pickValue(record, ['treatmentTypes', '施術種別']);
        if (raw && typeof raw === 'object') {
          return {
            acupuncture: !!raw.acupuncture || !!raw.鍼灸,
            massage: !!raw.massage || !!raw.マッサージ
          };
        }
        const text = String(raw || pickValue(record, ['treatmentType', 'type']) || '');
        return {
          acupuncture: text.includes('鍼灸') || text.toLowerCase().includes('acupuncture'),
          massage: text.includes('マッサージ') || text.toLowerCase().includes('massage')
        };
      };

      const copyLastRecord = () => {
        const lastRecord = getLastRecordForPatient(formData.patientName);
        if (!lastRecord) return alert('この患者の前回記録が見つかりません。');
        const copiedTreatmentTypes = normalizeTreatmentTypes(lastRecord);
        setFormData(prev => ({
          ...prev,
          chiefComplaint: pickValue(lastRecord, ['chiefComplaint', '主訴']) || '',
          treatmentTypes: copiedTreatmentTypes.acupuncture || copiedTreatmentTypes.massage ? copiedTreatmentTypes : prev.treatmentTypes,
          acupunctureDisease: pickValue(lastRecord, ['acupunctureDisease', 'disease', '鍼灸傷病名', '傷病名']) || '',
          acupunctureAreas: toArray(pickValue(lastRecord, ['acupunctureAreas', '鍼灸部位'])),
          acupunctureDetails: toArray(pickValue(lastRecord, ['acupunctureDetails', 'acupunctureTechniques', '鍼灸手技'])),
          massageAreas: toArray(pickValue(lastRecord, ['massageAreas', 'マッサージ部位'])),
          massageDetails: toArray(pickValue(lastRecord, ['massageDetails', 'massageTechniques', 'マッサージ手技'])),
          notes: pickValue(lastRecord, ['notes', 'specialNotes', '特記事項']) || ''
        }));
      };

      const buildSaveConfirmation = () => {
        const treatmentLabels = [
          formData.treatmentTypes.acupuncture ? '鍼灸' : '',
          formData.treatmentTypes.massage ? 'マッサージ' : ''
        ].filter(Boolean);
        const hardErrors = [];
        const warnings = [];
        if (!formData.patientName) hardErrors.push('患者名');
        if (!formData.date) hardErrors.push('日付');
        if (treatmentLabels.length === 0) hardErrors.push('施術種別');
        if (formData.treatmentTypes.acupuncture) {
          if (!formData.acupunctureDisease) warnings.push('鍼灸: 傷病名が未入力です');
          if (formData.acupunctureAreas.length === 0) warnings.push('鍼灸: 部位が未入力です');
          if (formData.acupunctureDetails.length === 0) warnings.push('鍼灸: 手技が未入力です');
        }
        if (formData.treatmentTypes.massage) {
          if (formData.massageAreas.length === 0) warnings.push('マッサージ: 部位が未入力です');
          if (formData.massageDetails.length === 0) warnings.push('マッサージ: 手技が未入力です');
        }
        const lines = [
          '以下の内容で保存します。',
          '',
          `患者名: ${formData.patientName || '未入力'}`,
          `日付: ${formData.date || '未入力'}`,
          `施術種別: ${treatmentLabels.join('、') || '未入力'}`,
          `施術部位: ${[...formData.acupunctureAreas, ...formData.massageAreas].join('、') || '未入力'}`,
          `手技: ${[...formData.acupunctureDetails, ...formData.massageDetails].join('、') || '未入力'}`,
          `特記事項: ${formData.notes || 'なし'}`
        ];
        if (warnings.length > 0) lines.push('', '警告:', ...warnings.map(warning => `・${warning}`));
        return { hardErrors, message: lines.join('\n') };
      };

      const fetchData = async () => {
        if (GAS_WEB_APP_URL.includes('YOUR_GAS_WEB_APP_URL')) return;
        setIsLoading(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL);
          const result = await response.json();
          if (result.success) {
            setScheduleData(result.schedule);
            setPatientsData(result.patients);
            setLastRecordsData(result.lastRecords || {});
          } else alert("データ取得エラー: " + result.error);
        } catch (error) { console.error("通信エラー:", error); } 
        finally { setIsLoading(false); }
      };

      useEffect(() => { fetchData(); }, []);
      useEffect(() => { setFormData(prev => ({ ...prev, staffName: currentStaff })); }, [currentStaff]);

      const filteredSchedule = scheduleData.filter(item => getStaffName(item) === currentStaff && normalizeYmd(getScheduleDate(item)) === getJstTodayYmd());
      const filteredPatients = patientsData.filter(item => getStaffName(item) === currentStaff || !getStaffName(item)); // 担当なしも一応表示

      // --- スタンプ機能 ---
      useEffect(() => {
        if (activeTab !== 'record' || !canvasRef.current || !containerRef.current) return;
        const canvas = canvasRef.current;
        const container = containerRef.current;
        const ctx = canvas.getContext('2d');
        const drawCanvas = () => {
          canvas.width = container.clientWidth; canvas.height = container.clientHeight;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          marks.forEach(mark => {
            ctx.beginPath();
            if (mark.type === 'red-circle') {
              ctx.fillStyle = 'rgba(239, 68, 68, 0.8)'; ctx.arc(mark.x, mark.y, 10, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.stroke();
            } else if (mark.type === 'blue-cross') {
              ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 4; const size = 8;
              ctx.moveTo(mark.x - size, mark.y - size); ctx.lineTo(mark.x + size, mark.y + size);
              ctx.moveTo(mark.x + size, mark.y - size); ctx.lineTo(mark.x - size, mark.y + size); ctx.stroke();
            }
          });
        };
        drawCanvas();
        window.addEventListener('resize', drawCanvas);
        return () => window.removeEventListener('resize', drawCanvas);
      }, [activeTab, marks]);

      const handleCanvasTap = (e) => {
        e.preventDefault();
        const rect = canvasRef.current.getBoundingClientRect();
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        setMarks(prev => [...prev, { x: clientX - rect.left, y: clientY - rect.top, type: currentMarkType }]);
      };

      // --- フォーム関連 ---
      const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
      const handleTypeChange = (type) => setFormData(prev => ({ ...prev, treatmentTypes: { ...prev.treatmentTypes, [type]: !prev.treatmentTypes[type] } }));
      const handleDetailToggle = (type, option, category = 'details') => {
        setFormData(prev => {
          let key = type === 'acupuncture' ? (category === 'areas' ? 'acupunctureAreas' : 'acupunctureDetails') : (category === 'areas' ? 'massageAreas' : 'massageDetails');
          let targetArray = prev[key];
          return targetArray.includes(option) ? { ...prev, [key]: targetArray.filter(i => i !== option) } : { ...prev, [key]: [...targetArray, option] };
        });
      };

      // --- 予定追加処理 ---
      const addToSchedule = async (patient) => {
        const patientName = getPatientName(patient);
        const time = prompt(`${patientName}様の訪問時刻を入力してください\n(例: 10:00)`);
        if (!time) return;
        setIsLoading(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'add_schedule', date: getJstTodayYmd(), staffName: currentStaff, patientName: patientName, time: time, address: patient.address, phone: pickValue(patient, ['phone', 'tel', 'telephone', '電話番号', '電話']) })
          });
          const result = await response.json();
          if (result.success) { alert("予定を追加しました"); fetchData(); setActiveTab('schedule'); }
          else alert("エラー: " + result.error);
        } catch (e) { alert("通信エラー"); } finally { setIsLoading(false); }
      };

      // --- AI・保存処理 ---
      const generateAIText = async () => {
        if (!formData.notes.trim()) return alert("メモを入力してください。");
        setIsGeneratingAI(true); setSaveError('');
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'ai_convert', notes: formData.notes, chiefComplaint: formData.chiefComplaint, treatmentTypes: formData.treatmentTypes, disease: formData.acupunctureDisease, acupunctureAreas: formData.acupunctureAreas, acupunctureDetails: formData.acupunctureDetails, massageAreas: formData.massageAreas, massageDetails: formData.massageDetails })
          });
          const result = await response.json();
          if (result.success) setFormData(prev => ({ ...prev, notes: result.text }));
          else setSaveError("AIエラー: " + result.error);
        } catch (error) { setSaveError("通信エラー"); } finally { setIsGeneratingAI(false); }
      };

      const handleSave = async () => {
        const missingItems = [];
        const treatmentLabels = [
          formData.treatmentTypes.acupuncture ? '鍼灸' : '',
          formData.treatmentTypes.massage ? 'マッサージ' : ''
        ].filter(Boolean);

        if (!formData.patientName) missingItems.push('患者名');
        if (!formData.date) missingItems.push('日付');
        if (treatmentLabels.length === 0) missingItems.push('施術種別（鍼灸・マッサージのいずれか）');
        if (formData.treatmentTypes.acupuncture) {
          if (!formData.acupunctureDisease) missingItems.push('鍼灸傷病名');
          if (formData.acupunctureAreas.length === 0) missingItems.push('鍼灸部位');
          if (formData.acupunctureDetails.length === 0) missingItems.push('鍼灸手技');
        }
        if (formData.treatmentTypes.massage) {
          if (formData.massageAreas.length === 0) missingItems.push('マッサージ部位');
          if (formData.massageDetails.length === 0) missingItems.push('マッサージ手技');
        }
        if (missingItems.length > 0) {
          alert(['不足項目があります。保存できません。', '', ...missingItems.map(item => `・${item}`)].join('\n'));
          return;
        }

        const confirmationMessage = [
          '以下の内容で保存します。',
          '',
          `患者名: ${formData.patientName}`,
          `日付: ${formData.date}`,
          `施術種別: ${treatmentLabels.join('、')}`,
          `施術部位: ${[...formData.acupunctureAreas, ...formData.massageAreas].join('、')}`,
          `手技: ${[...formData.acupunctureDetails, ...formData.massageDetails].join('、')}`,
          `特記事項: ${formData.notes || 'なし'}`
        ].join('\n');
        if (!window.confirm(confirmationMessage)) return;

        setIsSaving(true); setSaveError('');
        let imageData = '';
        if (marks.length > 0 && canvasRef.current) imageData = canvasRef.current.toDataURL('image/png');

        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'save_record', ...formData, markingImage: imageData })
          });
          const result = await response.json();
          if (result.success) {
            alert("保存しました！"); setActiveTab('schedule');
            setFormData(prev => ({ ...prev, patientName: '', chiefComplaint: '', treatmentTypes: { acupuncture: false, massage: false }, acupunctureDisease: '', acupunctureAreas: [], acupunctureDetails: [], massageAreas: [], massageDetails: [], notes: '' }));
            setMarks([]);
          } else setSaveError("保存エラー: " + result.error);
        } catch (error) { setSaveError("通信エラー"); } finally { setIsSaving(false); }
      };

      const startRecording = (patientName) => { setFormData(prev => ({ ...prev, patientName: patientName, staffName: currentStaff })); setActiveTab('record'); window.scrollTo(0, 0); };

      return (
        <div className="min-h-screen pb-safe bg-gray-50">
          <header className="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-40">
            <h1 className="text-xl font-bold text-center flex items-center justify-center gap-2"><Stethoscope className="w-6 h-6" />訪問鍼灸アプリ</h1>
          </header>

          <main className="p-4 pb-[calc(16rem+env(safe-area-inset-bottom))] sm:pb-36 max-w-lg mx-auto">
            {saveError && (
              <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 flex items-center gap-2 border border-red-200">
                <AlertCircle className="w-5 h-5 flex-shrink-0" /><span className="text-sm">{saveError}</span>
              </div>
            )}

            {/* 共通の担当者選択 */}
            {(activeTab === 'schedule' || activeTab === 'patients') && (
              <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6">
                <h2 className="text-sm font-semibold text-gray-500 mb-3 flex items-center gap-2"><UserCircle className="w-5 h-5" />担当者を選択</h2>
                <div className="flex gap-2">
                  {STAFF_NAMES.map(staff => (
                    <button key={staff} onClick={() => setCurrentStaff(staff)} className={`flex-1 py-2 rounded-lg text-sm font-bold transition-colors ${currentStaff === staff ? 'bg-emerald-600 text-white shadow-md' : 'bg-gray-100 text-gray-600'}`}>{staff}</button>
                  ))}
                </div>
              </section>
            )}

            {/* タブ1: 今日の訪問予定 */}
            {activeTab === 'schedule' && (
              <section>
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-semibold text-gray-700 flex items-center gap-2"><Calendar className="w-5 h-5 text-emerald-500" />今日の訪問予定</h2>
                  <button onClick={fetchData} className="flex items-center gap-1 p-2 bg-emerald-50 text-emerald-600 rounded-lg text-sm font-medium"><RefreshCcw className={`w-4 h-4 ${isLoading ? 'animate-spin' : ''}`} />更新</button>
                </div>
                <div className="space-y-4">
                  {isLoading ? <div className="text-center py-8 text-gray-400"><Loader2 className="w-8 h-8 animate-spin mx-auto mb-2" /></div>
                  : filteredSchedule.length === 0 ? <div className="bg-white p-6 rounded-xl shadow-sm text-center text-gray-500">予定はありません。<br/>患者リストから追加してください。</div>
                  : filteredSchedule.map(patient => {
                    const patientName = getPatientName(patient);
                    return (
                    <div key={patient.id || `${patientName}-${patient.time}`} className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-emerald-500 relative">
                      <div className="flex justify-between items-start mb-3">
                        <div>
                          <div className="text-xl font-bold text-gray-800 flex items-baseline gap-2">{patient.time} <span className="text-lg">{patientName} 様</span></div>
                        </div>
                        <button onClick={() => startRecording(patientName)} className="bg-emerald-50 text-emerald-600 p-2 rounded-lg font-bold text-sm flex items-center gap-1"><Pen className="w-4 h-4"/>記録</button>
                      </div>
                      <div className="pt-2 border-t border-gray-100 text-sm text-gray-600 flex flex-col gap-2">
                        <div className="flex gap-2"><MapPin className="w-4 h-4"/>{patient.address}</div>
                        <div className="flex gap-2"><Phone className="w-4 h-4"/><a href={`tel:${pickValue(patient, ['phone', 'tel', 'telephone', '電話番号', '電話']) || ''}`} className="text-blue-500 font-medium">{pickValue(patient, ['phone', 'tel', 'telephone', '電話番号', '電話']) || '-'}</a></div>
                      </div>
                    </div>
                  )})}
                </div>
              </section>
            )}

            {/* タブ2: 患者リスト */}
            {activeTab === 'patients' && (
              <section>
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-semibold text-gray-700 flex items-center gap-2"><Users className="w-5 h-5 text-blue-500" />患者リスト</h2>
                  <button onClick={fetchData} className="flex items-center gap-1 p-2 bg-blue-50 text-blue-600 rounded-lg text-sm font-medium"><RefreshCcw className={`w-4 h-4 ${isLoading ? 'animate-spin' : ''}`} />更新</button>
                </div>
                <div className="space-y-3">
                  {isLoading ? <div className="text-center py-8 text-gray-400"><Loader2 className="w-8 h-8 animate-spin mx-auto mb-2" /></div>
                  : filteredPatients.map(p => {
                    const patientName = getPatientName(p);
                    const patientKey = p.id || patientName;
                    const missingFields = getPatientMissingFields(p);
                    return (
                    <div key={patientKey} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                      <div className="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50" onClick={() => setExpandedPatientId(expandedPatientId === patientKey ? null : patientKey)}>
                        <div>
                          <div className="font-bold text-lg text-gray-800">{patientName} 様</div>
                          {missingFields.length > 0 && <div className="inline-flex items-center gap-1 mt-1 px-2 py-0.5 rounded bg-amber-50 text-amber-700 text-xs font-bold border border-amber-200"><AlertCircle className="w-3 h-3" />未入力あり</div>}
                        </div>
                        {expandedPatientId === patientKey ? <ChevronUp className="w-5 h-5 text-gray-400"/> : <ChevronDown className="w-5 h-5 text-gray-400"/>}
                      </div>
                      
                      {expandedPatientId === patientKey && (
                        <div className="px-4 pb-4 border-t border-gray-100 pt-3 bg-gray-50 text-sm space-y-2 text-gray-700">
                          {missingFields.length > 0 && (
                            <div className="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg">
                              <div className="font-bold flex items-center gap-1"><AlertCircle className="w-4 h-4" />未入力あり</div>
                              <div className="mt-1 text-xs">不足項目: {missingFields.join('、')}</div>
                            </div>
                          )}
                          <div className="grid grid-cols-2 gap-2 mb-3">
                            <div><span className="text-xs text-gray-500 block">年齢</span>{p.age || '-'}</div>
                            <div><span className="text-xs text-gray-500 block">負担割合</span>{p.insuranceRate || '-'}</div>
                            <div><span className="text-xs text-gray-500 block">医療証</span>{p.hasMedicalCert || '-'}</div>
                            <div><span className="text-xs text-gray-500 block">キーパーソン</span>{p.keyPersonName} ({p.keyPersonRelation})</div>
                          </div>
                          <div><span className="text-xs text-gray-500 block">住所</span>{p.address || '-'}</div>
                          <div><span className="text-xs text-gray-500 block">電話番号</span>{pickValue(p, ['phone', 'tel', 'telephone', '電話番号', '電話']) || '-'}</div>
                          <div><span className="text-xs text-gray-500 block">生年月日</span>{pickValue(p, ['birthDate', 'birthday', 'dateOfBirth', '生年月日']) || '-'}</div>
                          <div><span className="text-xs text-gray-500 block">目標</span>{p.goal || '-'}</div>
                          <div><span className="text-xs text-gray-500 block">注意事項</span><span className="text-red-500 font-medium">{p.notes || '-'}</span></div>
                          <div><span className="text-xs text-gray-500 block">内容</span>{pickValue(p, ['content', 'treatmentContent', 'contents', '内容']) || '-'}</div>
                          <div><span className="text-xs text-gray-500 block">特記事項</span>{p.specialNotes || '-'}</div>
                          
                          <div className="flex gap-2 pt-3 mt-2 border-t border-gray-200">
                            <button onClick={() => addToSchedule(p)} className="flex-1 bg-blue-100 text-blue-700 py-2 rounded-lg font-bold flex justify-center items-center gap-1"><Plus className="w-4 h-4"/>予定に追加</button>
                            <button onClick={() => startRecording(patientName)} className="flex-1 bg-emerald-100 text-emerald-700 py-2 rounded-lg font-bold flex justify-center items-center gap-1"><Pen className="w-4 h-4"/>直接記録</button>
                          </div>
                        </div>
                      )}
                    </div>
                  )})}
                </div>
              </section>
            )}

            {/* タブ3: 入力中 (記録画面) */}
            {activeTab === 'record' && (
              <div className="space-y-6">
                <div className="bg-indigo-50 border border-indigo-100 text-indigo-800 p-3 rounded-lg flex items-center justify-center gap-2 font-bold shadow-sm">
                  <User className="w-5 h-5" /> 担当者: {formData.staffName}
                </div>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2"><User className="w-5 h-5 text-emerald-500" />患者情報</h2>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1">患者名 *</label>
                      <select name="patientName" value={formData.patientName} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg bg-white">
                        <option value="">選択してください</option>
                        {patientsData.map(p => {
                          const patientName = getPatientName(p);
                          return <option key={patientName} value={patientName}>{patientName}</option>;
                        })}
                      </select>
                    </div>
                    <button onClick={copyLastRecord} disabled={!formData.patientName} className="w-full flex justify-center gap-2 bg-amber-50 text-amber-700 font-bold py-3 px-4 rounded-lg border border-amber-200 disabled:opacity-50 disabled:cursor-not-allowed">
                      <RefreshCcw className="w-5 h-5" />前回記録をコピー
                    </button>
                    <div><label className="block text-sm font-medium text-gray-600 mb-1">日付</label><input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg bg-white" /></div>
                    <div><label className="block text-sm font-medium text-gray-600 mb-1">訪問種別</label>
                      <div className="flex gap-2">
                        {['初検', '再検'].map(type => <button key={type} onClick={() => setFormData(prev=>({...prev, visitType: type}))} className={`flex-1 py-2 rounded border ${formData.visitType===type ? 'bg-indigo-500 text-white' : 'bg-white text-gray-600'}`}>{type}</button>)}
                      </div>
                    </div>
                    <div><label className="block text-sm font-medium text-gray-600 mb-1">主訴</label><input type="text" name="chiefComplaint" value={formData.chiefComplaint} onChange={handleInputChange} placeholder="例: 腰痛、肩こり" className="w-full p-3 border border-gray-300 rounded-lg bg-white" /></div>
                  </div>
                </section>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2"><CheckCircle className="w-5 h-5 text-blue-500" />施術内容</h2>
                  <div className="flex gap-4 mb-6">
                    <label className={`flex-1 flex items-center justify-center p-3 rounded-lg border-2 font-bold cursor-pointer transition-colors ${formData.treatmentTypes.acupuncture ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-200 text-gray-500'}`}><input type="checkbox" className="hidden" checked={formData.treatmentTypes.acupuncture} onChange={() => handleTypeChange('acupuncture')} />鍼灸</label>
                    <label className={`flex-1 flex items-center justify-center p-3 rounded-lg border-2 font-bold cursor-pointer transition-colors ${formData.treatmentTypes.massage ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-200 text-gray-500'}`}><input type="checkbox" className="hidden" checked={formData.treatmentTypes.massage} onChange={() => handleTypeChange('massage')} />マッサージ</label>
                  </div>

                  {formData.treatmentTypes.acupuncture && (
                    <div className="mb-6 p-4 bg-emerald-50 rounded-lg border border-emerald-100 space-y-4">
                      <h3 className="font-bold text-emerald-800 border-b border-emerald-200 pb-2">鍼灸の詳細</h3>
                      <div><label className="block text-sm font-medium text-emerald-700 mb-2">傷病名</label>
                        <div className="flex flex-wrap gap-2">{ACUPUNCTURE_DISEASES.map(d => <button key={d} onClick={() => setFormData(prev=>({...prev, acupunctureDisease: d}))} className={`px-3 py-2 text-sm rounded-lg border ${formData.acupunctureDisease === d ? 'bg-emerald-500 text-white' : 'bg-white'}`}>{d}</button>)}</div>
                      </div>
                      <div><label className="block text-sm font-medium text-emerald-700 mb-2">施術部位 (複数選択可)</label>
                        <div className="flex flex-wrap gap-2">{ACUPUNCTURE_AREAS.map(a => <button key={a} onClick={() => handleDetailToggle('acupuncture', a, 'areas')} className={`px-3 py-2 text-sm rounded-lg border ${formData.acupunctureAreas.includes(a) ? 'bg-emerald-500 text-white' : 'bg-white'}`}>{a}</button>)}</div>
                      </div>
                      <div><label className="block text-sm font-medium text-emerald-700 mb-2">手技・詳細 (複数選択可)</label>
                        <div className="flex flex-wrap gap-2">{ACUPUNCTURE_OPTIONS.map(opt => <button key={opt} onClick={() => handleDetailToggle('acupuncture', opt, 'details')} className={`px-3 py-2 text-sm rounded-lg border ${formData.acupunctureDetails.includes(opt) ? 'bg-emerald-500 text-white' : 'bg-white'}`}>{opt}</button>)}</div>
                      </div>
                    </div>
                  )}

                  {formData.treatmentTypes.massage && (
                    <div className="p-4 bg-blue-50 rounded-lg border border-blue-100 space-y-4">
                      <h3 className="font-bold text-blue-800 border-b border-blue-200 pb-2">マッサージの詳細</h3>
                      <div><label className="block text-sm font-medium text-blue-700 mb-2">部位 (複数選択可)</label>
                        <div className="flex flex-wrap gap-2">{MASSAGE_AREAS.map(area => <button key={area} onClick={() => handleDetailToggle('massage', area, 'areas')} className={`px-3 py-2 text-sm rounded-lg border ${formData.massageAreas.includes(area) ? 'bg-blue-500 text-white' : 'bg-white'}`}>{area}</button>)}</div>
                      </div>
                      <div><label className="block text-sm font-medium text-blue-700 mb-2">手技 (複数選択可)</label>
                        <div className="flex flex-wrap gap-2">{MASSAGE_OPTIONS.map(opt => <button key={opt} onClick={() => handleDetailToggle('massage', opt, 'details')} className={`px-3 py-2 text-sm rounded-lg border ${formData.massageDetails.includes(opt) ? 'bg-blue-500 text-white' : 'bg-white'}`}>{opt}</button>)}</div>
                      </div>
                    </div>
                  )}
                </section>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <div className="flex justify-between items-center mb-4"><h2 className="text-lg font-semibold text-gray-700 flex items-center gap-2"><MapPin className="w-5 h-5 text-orange-500" />人体図</h2>
                    <div className="flex gap-2">
                      <button onClick={()=>setMarks(prev=>prev.slice(0,-1))} disabled={marks.length===0} className="flex items-center gap-1 text-sm bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200 disabled:opacity-50"><Undo className="w-4 h-4"/>1つ戻る</button>
                      <button onClick={()=>setMarks([])} disabled={marks.length===0} className="flex items-center gap-1 text-sm bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200 disabled:opacity-50"><Eraser className="w-4 h-4"/>クリア</button>
                    </div>
                  </div>
                  <div className="flex gap-2 mb-3 bg-gray-50 p-1 rounded-lg border border-gray-200">
                    <button onClick={() => setCurrentMarkType('red-circle')} className={`flex-1 py-2 flex justify-center items-center gap-2 rounded-md text-sm font-bold ${currentMarkType === 'red-circle' ? 'bg-white text-red-600 shadow-sm border border-red-200' : 'text-gray-500'}`}><span className="w-3 h-3 rounded-full bg-red-500 border-2 border-white ring-1 ring-red-500"></span>痛み</button>
                    <button onClick={() => setCurrentMarkType('blue-cross')} className={`flex-1 py-2 flex justify-center items-center gap-2 rounded-md text-sm font-bold ${currentMarkType === 'blue-cross' ? 'bg-white text-blue-600 shadow-sm border border-blue-200' : 'text-gray-500'}`}><span className="text-blue-500 font-black text-lg">✖</span>凝り・張り</button>
                  </div>
                  <div ref={containerRef} className="relative w-full aspect-[3/4] bg-white rounded-lg border border-gray-200 overflow-hidden touch-none">
                    <img src="image.png" alt="人体図" className="absolute inset-0 w-full h-full object-contain pointer-events-none opacity-60" />
                    <canvas ref={canvasRef} onMouseDown={handleCanvasTap} onTouchStart={handleCanvasTap} className="absolute inset-0 w-full h-full cursor-crosshair" />
                  </div>
                </section>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2"><Sparkles className="w-5 h-5 text-purple-500" />特記事項 (AI連携)</h2>
                  <textarea name="notes" value={formData.notes} onChange={handleInputChange} rows="4" placeholder="略語やメモを入力..." className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 mb-3"></textarea>
                  <button onClick={generateAIText} disabled={isGeneratingAI} className="w-full flex justify-center gap-2 bg-gradient-to-r from-purple-500 to-indigo-500 text-white font-bold py-3 px-4 rounded-lg shadow-sm disabled:opacity-70">
                    {isGeneratingAI ? <><Loader2 className="w-5 h-5 animate-spin" />処理中...</> : <><Sparkles className="w-5 h-5" />AIで文章を整える</>}
                  </button>
                </section>
              </div>
            )}
          </main>

          {/* 右下フローティング保存ボタン (記録タブのみ表示) */}
          {activeTab === 'record' && (
             <button onClick={handleSave} disabled={isSaving} className="fixed bottom-[calc(8.5rem+env(safe-area-inset-bottom))] sm:bottom-24 right-4 z-[60] flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-full shadow-xl transition-all border-4 border-white">
               {isSaving ? <Loader2 className="w-6 h-6 animate-spin" /> : <Save className="w-6 h-6" />}
               <span>保存する</span>
             </button>
          )}

          {/* 3タブ構成のボトムナビゲーション (左から: 訪問予定, 患者リスト, 入力中) */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 flex justify-between shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] pb-safe pt-2">
            <button onClick={() => setActiveTab('schedule')} className={`flex-1 flex flex-col items-center p-2 transition-colors ${activeTab === 'schedule' ? 'text-emerald-600' : 'text-gray-400'}`}>
              <Calendar className={`w-6 h-6 mb-1 ${activeTab === 'schedule' ? 'fill-emerald-100' : ''}`} />
              <span className="text-[10px] font-bold">今日の訪問予定</span>
            </button>
            <button onClick={() => setActiveTab('patients')} className={`flex-1 flex flex-col items-center p-2 transition-colors ${activeTab === 'patients' ? 'text-blue-600' : 'text-gray-400'}`}>
              <Users className={`w-6 h-6 mb-1 ${activeTab === 'patients' ? 'fill-blue-100' : ''}`} />
              <span className="text-[10px] font-bold">患者リスト</span>
            </button>
            <button onClick={() => setActiveTab('record')} className={`flex-1 flex flex-col items-center p-2 transition-colors ${activeTab === 'record' ? 'text-indigo-600' : 'text-gray-400'}`}>
              <FilePlus2 className={`w-6 h-6 mb-1 ${activeTab === 'record' ? 'fill-indigo-100' : ''}`} />
              <span className="text-[10px] font-bold">入力中</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
