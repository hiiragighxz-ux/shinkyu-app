<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>訪問鍼灸アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 80px); } /* ボトムナビゲーション用の余白 */
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Pen, Eraser, Save, User, FileText, CheckCircle, Stethoscope, MapPin, Percent, UserCircle, RefreshCcw, Sparkles, Loader2, Info, Users, Navigation, Phone, Calendar, AlertCircle } from 'lucide-react';

    // ★ご自身のGASのURLに書き換えてください
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyzKXEjzeCnt25coqe2ItRkgFhu-rQUMY5hZnVi2wE-6A8Rpa_oorPPkFNYmOPUIpBBNA/exec';

    const STAFF_NAMES = ['森', '野口', '西山', '岡島'];
    const INSURANCE_RATES = ['1割', '2割', '3割', '0割'];
    const ACUPUNCTURE_DISEASES = ['神経痛', 'リウマチ', '頸肩腕症候群', '五十肩', '腰痛症', '頸椎捻挫後遺症'];
    const MASSAGE_AREAS = ['躯幹', '右上肢', '左上肢', '右下肢', '左下肢'];
    const ACUPUNCTURE_OPTIONS = ['毫鍼（ごうしん）', '円皮鍼', '灸頭鍼', '台座灸', '透熱灸', '小児鍼', '電気鍼(パルス)'];
    const MASSAGE_OPTIONS = ['指圧', '揉捏', '軽擦', 'ストレッチ', '関節モビライゼーション', 'オイルマッサージ', 'あん摩'];

    function App() {
      const [activeTab, setActiveTab] = useState('patients');
      const [currentStaff, setCurrentStaff] = useState('森'); 
      
      // ★スケジュール関連のステート（空っぽからスタート）
      const [scheduleData, setScheduleData] = useState([]);
      const [isLoadingSchedule, setIsLoadingSchedule] = useState(false);

      const [formData, setFormData] = useState({
        staffName: '森', visitType: '再検', locationType: '往診', distance: '', insuranceRate: '1割', patientName: '',
        date: new Date().toISOString().split('T')[0], chiefComplaint: '',
        treatmentTypes: { acupuncture: false, massage: false }, acupunctureDisease: '', acupunctureDetails: [],
        massageAreas: [], massageDetails: [], notes: ''
      });

      const [isSaving, setIsSaving] = useState(false);
      const [isSaved, setIsSaved] = useState(false);
      const [saveError, setSaveError] = useState('');
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);
      const canvasRef = useRef(null);
      const containerRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [color, setColor] = useState('#ef4444');
      const [lineWidth, setLineWidth] = useState(4);

      // ==========================================
      // 【追加】GASからスケジュールを取得する関数
      // ==========================================
      const fetchSchedule = async () => {
        if (GAS_WEB_APP_URL.includes('YOUR_GAS_WEB_APP_URL')) return;
        setIsLoadingSchedule(true);
        try {
          const response = await fetch(GAS_WEB_APP_URL);
          const result = await response.json();
          if (result.success) {
            setScheduleData(result.data);
          } else {
            alert("スケジュール取得エラー: " + result.error);
          }
        } catch (error) {
          console.error("通信エラー:", error);
          // エラー時はアラートを出さずコンソールのみ（邪魔にならないように）
        } finally {
          setIsLoadingSchedule(false);
        }
      };

      // 初回起動時にスケジュールを読み込む
      useEffect(() => {
        fetchSchedule();
      }, []);

      // スタッフが変わったらformDataも更新
      useEffect(() => {
        setFormData(prev => ({ ...prev, staffName: currentStaff }));
      }, [currentStaff]);

      // 現在選択されているスタッフのスケジュールだけを抽出
      const filteredSchedule = scheduleData.filter(item => item.staff === currentStaff);

      // --- Canvas関連 ---
      useEffect(() => {
        if (activeTab !== 'record' || !canvasRef.current || !containerRef.current) return;
        const canvas = canvasRef.current;
        const container = containerRef.current;
        const ctx = canvas.getContext('2d');
        const resizeCanvas = () => {
          const tempCanvas = document.createElement('canvas');
          const tempCtx = tempCanvas.getContext('2d');
          tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
          if (canvas.width > 0 && canvas.height > 0) tempCtx.drawImage(canvas, 0, 0);
          canvas.width = container.clientWidth; canvas.height = container.clientHeight;
          ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.drawImage(tempCanvas, 0, 0);
        };
        setTimeout(resizeCanvas, 50);
        window.addEventListener('resize', resizeCanvas);
        return () => window.removeEventListener('resize', resizeCanvas);
      }, [activeTab]);

      const getCoordinates = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        return e.touches && e.touches.length > 0 
          ? { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top }
          : { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const startDrawing = (e) => { e.preventDefault(); const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(x, y); setIsDrawing(true); };
      const draw = (e) => { e.preventDefault(); if (!isDrawing) return; const { x, y } = getCoordinates(e); const ctx = canvasRef.current.getContext('2d'); ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.lineTo(x, y); ctx.stroke(); };
      const stopDrawing = () => setIsDrawing(false);
      const clearCanvas = () => canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);

      // --- フォーム関連 ---
      const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
      const handleRadioChange = (name, value) => setFormData(prev => ({ ...prev, [name]: value, ...(name === 'locationType' && value === '来院' ? { distance: '' } : {}) }));
      const handleTypeChange = (type) => setFormData(prev => ({ ...prev, treatmentTypes: { ...prev.treatmentTypes, [type]: !prev.treatmentTypes[type] } }));
      const handleDetailToggle = (type, option, isArea = false) => {
        setFormData(prev => {
          let key = type === 'acupuncture' ? 'acupunctureDetails' : (isArea ? 'massageAreas' : 'massageDetails');
          let targetArray = prev[key];
          return targetArray.includes(option) ? { ...prev, [key]: targetArray.filter(i => i !== option) } : { ...prev, [key]: [...targetArray, option] };
        });
      };

      // --- 通信処理 ---
      const generateAIText = async () => {
        if (!formData.notes.trim()) return alert("メモを入力してください。");
        if (GAS_WEB_APP_URL.includes('YOUR_GAS_WEB_APP_URL')) return alert("設定エラー: GASのURLが設定されていません。");
        setIsGeneratingAI(true); setSaveError('');
        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'ai_convert', notes: formData.notes, treatmentTypes: formData.treatmentTypes, disease: formData.acupunctureDisease })
          });
          const result = await response.json();
          if (result.success) setFormData(prev => ({ ...prev, notes: result.text }));
          else setSaveError("AIエラー: " + result.error);
        } catch (error) { setSaveError("通信エラー: 接続を確認してください。"); } 
        finally { setIsGeneratingAI(false); }
      };

      const handleSave = async () => {
        if (!formData.patientName) return alert("患者名を選択してください。");
        if (GAS_WEB_APP_URL.includes('YOUR_GAS_WEB_APP_URL')) return alert("設定エラー: GASのURLが設定されていません。");
        setIsSaving(true); setSaveError('');
        
        const canvas = canvasRef.current;
        let imageData = '';
        const ctx = canvas.getContext('2d');
        const pixelBuffer = new Uint32Array(ctx.getImageData(0, 0, canvas.width, canvas.height).data.buffer);
        if(pixelBuffer.some(color => color !== 0)) imageData = canvas.toDataURL('image/png');

        try {
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: 'save_record', ...formData, markingImage: imageData })
          });
          const result = await response.json();
          if (result.success) {
            setIsSaved(true);
            setTimeout(() => { 
              setIsSaved(false); setActiveTab('patients');
              setFormData(prev => ({ ...prev, patientName: '', chiefComplaint: '', treatmentTypes: { acupuncture: false, massage: false }, acupunctureDisease: '', acupunctureDetails: [], massageAreas: [], massageDetails: [], notes: '' }));
              if(canvasRef.current) clearCanvas();
            }, 2000);
          } else setSaveError("保存エラー: " + result.error);
        } catch (error) { setSaveError("通信エラー: 接続を確認してください。"); } 
        finally { setIsSaving(false); }
      };

      const openGoogleMapsRoute = (address) => window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address)}`, '_blank');
      const startRecording = (patientName) => { setFormData(prev => ({ ...prev, patientName: patientName, staffName: currentStaff })); setActiveTab('record'); window.scrollTo(0, 0); };

      return (
        <div className="min-h-screen pb-safe bg-gray-50">
          <header className="bg-emerald-600 text-white p-4 shadow-md sticky top-0 z-40">
            <h1 className="text-xl font-bold text-center flex items-center justify-center gap-2">
              <Stethoscope className="w-6 h-6" />
              訪問鍼灸アプリ
            </h1>
          </header>

          <main className="p-4 max-w-lg mx-auto">
            {saveError && (
              <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 flex items-center gap-2 border border-red-200">
                <AlertCircle className="w-5 h-5 flex-shrink-0" />
                <span className="text-sm">{saveError}</span>
              </div>
            )}

            {activeTab === 'patients' && (
              <div className="space-y-6">
                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-sm font-semibold text-gray-500 mb-3 flex items-center gap-2">
                    <UserCircle className="w-5 h-5" />
                    自分の名前を選択してください
                  </h2>
                  <div className="flex gap-2">
                    {STAFF_NAMES.map(staff => (
                      <button key={staff} onClick={() => setCurrentStaff(staff)} className={`flex-1 py-2 rounded-lg text-sm font-bold transition-colors ${currentStaff === staff ? 'bg-emerald-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                        {staff}
                      </button>
                    ))}
                  </div>
                </section>

                <section>
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold text-gray-700 flex items-center gap-2">
                      <Calendar className="w-5 h-5 text-emerald-500" />
                      訪問予定 <span className="text-sm bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full ml-2">担当: {currentStaff}</span>
                    </h2>
                    
                    {/* ★追加: 同期（リフレッシュ）ボタン */}
                    <button onClick={fetchSchedule} disabled={isLoadingSchedule} className="flex items-center gap-1 p-2 bg-emerald-50 text-emerald-600 rounded-lg hover:bg-emerald-100 transition-colors text-sm font-medium">
                      <RefreshCcw className={`w-4 h-4 ${isLoadingSchedule ? 'animate-spin' : ''}`} />
                      更新
                    </button>
                  </div>
                  
                  <div className="space-y-4">
                    {isLoadingSchedule ? (
                      <div className="text-center py-8 text-gray-400 flex flex-col items-center">
                        <Loader2 className="w-8 h-8 animate-spin mb-2" />
                        <p>予定を読み込んでいます...</p>
                      </div>
                    ) : filteredSchedule.length === 0 ? (
                      <div className="bg-white p-6 rounded-xl shadow-sm text-center text-gray-500 border border-gray-100">
                        該当する予定はありません。
                      </div>
                    ) : (
                      filteredSchedule.map(patient => (
                        <div key={patient.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 relative overflow-hidden border-l-4 border-l-emerald-500">
                          <div className="flex justify-between items-start mb-3">
                            <div>
                              <div className="text-xs font-bold text-gray-500 mb-1">{patient.date}</div>
                              <div className="text-xl font-bold text-gray-800 flex items-baseline gap-2">
                                {patient.time}
                                <span className="text-lg">{patient.name} 様</span>
                              </div>
                              <span className="inline-block mt-1 px-2 py-1 bg-orange-100 text-orange-700 text-xs rounded-md font-medium">
                                {patient.status}
                              </span>
                            </div>
                            <button onClick={() => startRecording(patient.name)} className="flex flex-col items-center justify-center bg-emerald-50 text-emerald-600 p-2 rounded-lg border border-emerald-100 hover:bg-emerald-100 transition-colors min-w-[70px]">
                              <Pen className="w-5 h-5 mb-1" />
                              <span className="text-xs font-bold">記録する</span>
                            </button>
                          </div>
                          
                          <div className="pt-3 border-t border-gray-100 space-y-2">
                            <div className="flex items-start gap-2 text-sm text-gray-600">
                              <MapPin className="w-4 h-4 text-gray-400 mt-0.5 flex-shrink-0" />
                              <span>{patient.address}</span>
                            </div>
                            <div className="flex items-center gap-2 text-sm">
                              <Phone className="w-4 h-4 text-gray-400 flex-shrink-0" />
                              <a href={`tel:${patient.phone}`} className="text-blue-500 hover:underline font-medium">{patient.phone}</a>
                            </div>
                          </div>
                          
                          <button onClick={() => openGoogleMapsRoute(patient.address)} className="mt-4 w-full flex items-center justify-center gap-2 bg-blue-50 hover:bg-blue-100 text-blue-600 font-bold py-2.5 px-4 rounded-lg transition-colors border border-blue-200">
                            <Navigation className="w-4 h-4" />ルート案内
                          </button>
                        </div>
                      ))
                    )}
                  </div>
                </section>
              </div>
            )}

            {/* --- 以下、記録タブ（変更なし） --- */}
            {activeTab === 'record' && (
              <div className="space-y-6">
                <div className="bg-indigo-50 border border-indigo-100 text-indigo-800 p-3 rounded-lg flex items-center justify-center gap-2 font-bold shadow-sm">
                  <User className="w-5 h-5" /> 担当者: {formData.staffName}
                </div>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <FileText className="w-5 h-5 text-indigo-500" /> レセプト情報
                  </h2>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-2 flex items-center gap-1">場所・距離</label>
                      <div className="flex gap-2 mb-2">
                        <button onClick={() => handleRadioChange('locationType', '来院')} className={`flex-1 py-2 text-sm rounded-lg border font-medium ${formData.locationType === '来院' ? 'bg-indigo-500 text-white border-indigo-500' : 'bg-white text-gray-700 border-gray-300'}`}>来院</button>
                        <button onClick={() => handleRadioChange('locationType', '往診')} className={`flex-1 py-2 text-sm rounded-lg border font-medium ${formData.locationType === '往診' ? 'bg-indigo-500 text-white border-indigo-500' : 'bg-white text-gray-700 border-gray-300'}`}>往診</button>
                      </div>
                      {formData.locationType === '往診' && (
                        <div className="flex gap-2">
                          <button onClick={() => handleRadioChange('distance', '〜4km')} className={`flex-1 py-2 text-sm rounded-lg border font-medium ${formData.distance === '〜4km' ? 'bg-indigo-400 text-white border-indigo-400' : 'bg-white text-gray-700 border-gray-300'}`}>〜4km</button>
                          <button onClick={() => handleRadioChange('distance', '4km超〜16km')} className={`flex-1 py-2 text-sm rounded-lg border font-medium ${formData.distance === '4km超〜16km' ? 'bg-indigo-400 text-white border-indigo-400' : 'bg-white text-gray-700 border-gray-300'}`}>4km超〜</button>
                        </div>
                      )}
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-2 flex items-center gap-1"><Percent className="w-4 h-4"/> 負担割合</label>
                      <div className="grid grid-cols-4 gap-2">
                        {INSURANCE_RATES.map(rate => (
                          <button key={rate} onClick={() => handleRadioChange('insuranceRate', rate)} className={`py-2 text-sm rounded-lg border font-medium ${formData.insuranceRate === rate ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-gray-700 border-gray-300'}`}>{rate}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                </section>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <User className="w-5 h-5 text-emerald-500" /> 患者情報
                  </h2>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1">患者名 *</label>
                      <select name="patientName" value={formData.patientName} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white">
                        <option value="">選択してください</option>
                        {/* 取得したスケジュールから患者名の重複を排除してリスト化 */}
                        {[...new Set(scheduleData.map(p => p.name))].map(name => <option key={name} value={name}>{name}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1">日付</label>
                      <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-600 mb-1">主訴</label>
                      <input type="text" name="chiefComplaint" value={formData.chiefComplaint} onChange={handleInputChange} placeholder="例: 腰痛、肩こり" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 bg-white" />
                    </div>
                  </div>
                </section>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <h2 className="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <CheckCircle className="w-5 h-5 text-blue-500" /> 施術内容
                  </h2>
                  <div className="flex gap-4 mb-6">
                    <label className={`flex-1 flex items-center justify-center p-3 rounded-lg border-2 font-bold cursor-pointer transition-colors ${formData.treatmentTypes.acupuncture ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-200 text-gray-500'}`}>
                      <input type="checkbox" className="hidden" checked={formData.treatmentTypes.acupuncture} onChange={() => handleTypeChange('acupuncture')} /> 鍼灸
                    </label>
                    <label className={`flex-1 flex items-center justify-center p-3 rounded-lg border-2 font-bold cursor-pointer transition-colors ${formData.treatmentTypes.massage ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-gray-200 text-gray-500'}`}>
                      <input type="checkbox" className="hidden" checked={formData.treatmentTypes.massage} onChange={() => handleTypeChange('massage')} /> マッサージ
                    </label>
                  </div>

                  {formData.treatmentTypes.acupuncture && (
                    <div className="mb-6 p-4 bg-emerald-50 rounded-lg border border-emerald-100">
                      <h3 className="font-bold text-emerald-800 mb-3 border-b border-emerald-200 pb-2">鍼灸の詳細</h3>
                      <div className="mb-4">
                        <label className="block text-sm font-medium text-emerald-700 mb-2">傷病名</label>
                        <div className="flex flex-wrap gap-2">
                          {ACUPUNCTURE_DISEASES.map(d => <button key={d} onClick={() => setFormData(prev => ({...prev, acupunctureDisease: d}))} className={`px-3 py-2 text-sm rounded-lg border ${formData.acupunctureDisease === d ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-gray-700 border-gray-300'}`}>{d}</button>)}
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-emerald-700 mb-2">手技・詳細 (複数選択可)</label>
                        <div className="flex flex-wrap gap-2">
                          {ACUPUNCTURE_OPTIONS.map(opt => <button key={opt} onClick={() => handleDetailToggle('acupuncture', opt)} className={`px-3 py-2 text-sm rounded-lg border transition-colors ${formData.acupunctureDetails.includes(opt) ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-gray-700 border-gray-300'}`}>{opt}</button>)}
                        </div>
                      </div>
                    </div>
                  )}

                  {formData.treatmentTypes.massage && (
                    <div className="p-4 bg-blue-50 rounded-lg border border-blue-100">
                      <h3 className="font-bold text-blue-800 mb-3 border-b border-blue-200 pb-2">マッサージの詳細</h3>
                      <div className="mb-4">
                        <label className="block text-sm font-medium text-blue-700 mb-2">部位 (複数選択可)</label>
                        <div className="flex flex-wrap gap-2">
                          {MASSAGE_AREAS.map(area => <button key={area} onClick={() => handleDetailToggle('massage', area, true)} className={`px-3 py-2 text-sm rounded-lg border transition-colors ${formData.massageAreas.includes(area) ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-700 border-gray-300'}`}>{area}</button>)}
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-blue-700 mb-2">手技 (複数選択可)</label>
                        <div className="flex flex-wrap gap-2">
                          {MASSAGE_OPTIONS.map(opt => <button key={opt} onClick={() => handleDetailToggle('massage', opt)} className={`px-3 py-2 text-sm rounded-lg border transition-colors ${formData.massageDetails.includes(opt) ? 'bg-blue-500 text-white border-blue-500' : 'bg-white text-gray-700 border-gray-300'}`}>{opt}</button>)}
                        </div>
                      </div>
                    </div>
                  )}
                </section>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold text-gray-700 flex items-center gap-2"><Pen className="w-5 h-5 text-orange-500" /> 人体図マーキング</h2>
                    <div className="flex gap-2">
                      <button onClick={() => setColor('#ef4444')} className={`w-8 h-8 rounded-full bg-red-500 shadow-sm transition-transform ${color === '#ef4444' ? 'ring-4 ring-red-200 scale-110' : ''}`}></button>
                      <button onClick={() => setColor('#3b82f6')} className={`w-8 h-8 rounded-full bg-blue-500 shadow-sm transition-transform ${color === '#3b82f6' ? 'ring-4 ring-blue-200 scale-110' : ''}`}></button>
                      <button onClick={clearCanvas} className="flex items-center gap-1 text-sm bg-gray-100 text-gray-600 px-2 py-1 rounded hover:bg-gray-200 ml-2"><Eraser className="w-4 h-4"/>クリア</button>
                    </div>
                  </div>
                  <div ref={containerRef} className="relative w-full aspect-[3/4] bg-gray-50 rounded-lg border border-gray-200 overflow-hidden touch-none">
                    <img src="image.png" alt="人体図" className="absolute inset-0 w-full h-full object-contain pointer-events-none opacity-50" />
                    <canvas ref={canvasRef} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseOut={stopDrawing} className="absolute inset-0 w-full h-full cursor-crosshair" />
                  </div>
                </section>

                <section className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-20">
                  <h2 className="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2"><Sparkles className="w-5 h-5 text-purple-500" /> 特記事項 (AI連携)</h2>
                  <div className="bg-purple-50 p-3 rounded-lg mb-4 text-sm text-purple-800 border border-purple-100 flex items-start gap-2">
                    <Info className="w-5 h-5 flex-shrink-0 mt-0.5" />
                    <p>メモや略語を入力して「AIで文章を整える」を押すと、自動で正式なカルテ文章に変換されます。</p>
                  </div>
                  <textarea name="notes" value={formData.notes} onChange={handleInputChange} rows="4" placeholder="メモを入力..." className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 bg-white mb-3"></textarea>
                  <button onClick={generateAIText} disabled={isGeneratingAI || isSaving} className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 text-white font-bold py-3 px-4 rounded-lg shadow-sm disabled:opacity-70 transition-all">
                    {isGeneratingAI ? <><Loader2 className="w-5 h-5 animate-spin" /> AI処理中...</> : <><Sparkles className="w-5 h-5" /> AIで文章を整える</>}
                  </button>
                </section>
              </div>
            )}
          </main>

          {/* ボトムナビゲーション */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-50 px-4 py-2 flex justify-around shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] pb-safe">
            <button onClick={() => setActiveTab('patients')} className={`flex flex-col items-center p-2 min-w-[80px] rounded-lg transition-colors ${activeTab === 'patients' ? 'text-emerald-600' : 'text-gray-400'}`}>
              <Calendar className={`w-6 h-6 mb-1 ${activeTab === 'patients' ? 'fill-emerald-100' : ''}`} />
              <span className="text-xs font-bold">訪問予定</span>
            </button>
            <div className="relative -top-6">
              <button onClick={() => activeTab === 'record' ? handleSave() : alert('予定から「記録する」を選んでください')} disabled={isSaving || activeTab !== 'record'} className={`flex flex-col items-center justify-center w-16 h-16 rounded-full shadow-lg text-white transition-all ${activeTab === 'record' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-gray-300'}`}>
                {isSaved ? <CheckCircle className="w-8 h-8" /> : isSaving ? <Loader2 className="w-8 h-8 animate-spin" /> : <Save className="w-8 h-8" />}
              </button>
            </div>
            <button onClick={() => setActiveTab('record')} disabled={activeTab !== 'record'} className={`flex flex-col items-center p-2 min-w-[80px] rounded-lg transition-colors ${(activeTab === 'record' && !isSaving) ? 'text-emerald-600' : 'text-gray-400'}`}>
              <FileText className={`w-6 h-6 mb-1 ${(activeTab === 'record' && !isSaving) ? 'fill-emerald-100' : ''}`} />
              <span className="text-xs font-bold">入力中</span>
            </button>
          </nav>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
